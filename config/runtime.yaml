market_context:
  spx_sector_instrument_ids:
    value: [equity:XLB, equity:XLC, equity:XLE, equity:XLF, equity:XLI, equity:XLK, equity:XLP, equity:XLRE, equity:XLU, equity:XLV, equity:XLY]
    description: Eleven S&P 500 sector ETFs combined into one hidden breadth feature rather than individual human alerts.
  sector_breadth_min_usable:
    value: 8
    description: Minimum fresh sector quotes required before sector breadth can influence the observational directional bias.
  sector_quote_max_age_seconds:
    value: 45
    description: Maximum source-quote age accepted by the fast sector-breadth feature.
  sector_unchanged_band_bps:
    value: 2
    description: Absolute move from prior close treated as unchanged when counting sector breadth.
  sector_directional_bias_score:
    value: 0.55
    description: Absolute advancing-minus-declining sector breadth score required for a bullish or bearish observational bias.
  direction_confirmation_move_bps:
    value: 5
    description: Minimum same-direction SPY and RSP moves required to confirm a sector-breadth directional bias.

service_loop:
  hyperliquid_enabled:
    value: true
    description: Enables the lightweight overnight SPX proxy context collector.
  polymarket_enabled:
    value: false
    description: Enables event-probability context collection when explicitly requested.
  ibkr_enabled:
    value: false
    description: Enables the snapshot IBKR collector inside the shared loop; the dedicated stream service remains separate.
  iv_surface_enabled:
    value: true
    description: Enables periodic implied-volatility surface snapshots.
  intraday_shock_enabled:
    value: false
    description: Enables the fast intraday shock detector in the shared loop when operationally selected.
  alerts_enabled:
    value: true
    description: Enables the alert engine task in the shared service loop.
  realtime_engine_enabled:
    value: true
    description: Enables RealtimeEngine tick + SQLite outbox consumer in the 24h loop.
  realtime_engine_interval_seconds:
    value: 15
    description: Cadence for RealtimeEngine tick and outbox drain.
  hyperliquid_interval_seconds:
    value: 30
    description: Cadence for lightweight overnight proxy context collection.
  polymarket_interval_seconds:
    value: 60
    description: Cadence for event-probability context collection.
  ibkr_interval_seconds:
    value: 60
    description: Cadence for the optional IBKR snapshot collector.
  iv_surface_interval_seconds:
    value: 300
    description: Cadence for recalculating and persisting the IV surface.
  intraday_shock_interval_seconds:
    value: 5
    description: Cadence for evaluating fast SPX shock and reclaim conditions.
  alert_interval_seconds:
    value: 30
    description: Cadence for running the full alert engine.
  heartbeat_seconds:
    value: 60
    description: Cadence for service-loop health telemetry.
  ibkr_skip_options:
    value: false
    description: Skips IBKR option snapshots while retaining non-option references when enabled.
  ibkr_connect_retry_seconds:
    value: 60
    description: Delay before retrying an unavailable IBKR snapshot connection.
  ibkr_conflict_probe_seconds:
    value: 60
    description: Delay before a read-only probe after an IBKR session conflict.
  max_concurrent_tasks:
    value: 4
    description: Maximum child tasks executed concurrently by the service loop.
  greek_shadow_enabled:
    value: false
    description: Enables high-order Greeks shadow telemetry without affecting live decisions.
  greek_shadow_interval_seconds:
    value: 60
    description: Cadence for high-order Greeks shadow telemetry.
  task_timeout_seconds:
    value: 120
    description: Hard timeout for a child-process task launched by the 24-hour service loop.
  output_tail_characters:
    value: 1200
    description: Maximum failed-task stdout or stderr characters retained in service telemetry.

ibkr:
  host:
    value: 127.0.0.1
    description: IB Gateway host used by the snapshot collector.
  port:
    value: 4002
    description: IB Gateway API port; 4002 is the default paper-trading port.
  client_id:
    value: 171
    description: Client id for the snapshot collector so it does not collide with stream or position clients.
  market_data_type:
    value: 1
    description: IBKR market data type requested by the collector; 1 means live data.
  verify_indexes:
    value: [SPX, VIX, VIX1D, VIX9D, VIX3M, VVIX, SKEW]
    description: Index symbols verified and collected from IBKR.
  verify_stocks:
    value: [SPY, QQQ, IWM, DIA, HYG, LQD, TLT, IEF, SHY, UUP, GLD, USO, RSP, XLU]
    description: ETF and equity context symbols verified and collected from IBKR.
  verify_futures:
