server {
    listen 18084 default_server;
    server_name _;
    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header Cache-Control "no-store, max-age=0" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 302 https://code.zh3nyu.com/proxy/18082/;
    }

    location = /friday {
        return 302 https://code.zh3nyu.com/proxy/18082/?view=friday;
    }

    location / {
        return 404;
    }
}
