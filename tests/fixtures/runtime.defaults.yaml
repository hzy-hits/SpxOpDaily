# SPX Spark runtime configuration.
#
# Every mutable value lives beside a human-readable description. Environment
# variables may override these defaults; secrets remain in .env and never live
# in this file.

schema_version:
  value: 1
  description: Version of this runtime configuration schema.

market_data:
  known_providers:
    value: [schwab, ibkr, hyperliquid, polymarket, internal, mock, unknown]
    description: Provider names accepted by storage and quote selection.
  provider_priority:
    value: [schwab, ibkr, hyperliquid, polymarket, internal, mock, unknown]
    description: Preferred provider order after freshness and quality checks; Schwab is primary and IBKR is fallback.
  latest_stale_after_seconds:
    value: 15
    description: Maximum age of a normal live quote before storage marks it stale.
  delayed_stale_after_seconds:
    value: 60
    description: Maximum age allowed for a quote explicitly labelled delayed.
  slow_index_stale_after_seconds:
    value: 900
    description: Longer freshness window for slow-moving index and macro reference quotes.
  slow_index_labels:
    value: [index:VIX, index:VIX1D, index:VIX9D, index:VIX3M, index:VVIX, index:SKEW, equity:QQQ, equity:IWM, equity:DIA, equity:HYG, equity:LQD, equity:TLT, equity:IEF, equity:SHY, equity:UUP, equity:GLD, equity:USO, equity:RSP, equity:XLU]
    description: Canonical instruments that use the longer slow-index freshness window.

analytics:
  max_chain_age_seconds: {value: 15.0, description: Maximum chain age.}
  gth_max_chain_age_seconds: {value: 90.0, description: Maximum GTH analytical chain age.}
  min_usable_strikes: {value: 21, description: Minimum usable strikes.}
  min_two_sided_ratio: {value: 0.80, description: Minimum two-sided ratio.}
  min_wing_strikes_each_side: {value: 8, description: Minimum wing strikes.}
  provider_priority: {value: [schwab, ibkr], description: Option provider priority.}
  underlier_reference_tolerance_fraction: {value: 0.02, description: Underlier tolerance.}

globex_trend:
  enabled: {value: true, description: Runs the continuous ES session trend and reversal state machine, rendering Globex or RTH semantics from the event timestamp.}
  interval_seconds: {value: 30, description: Evaluation cadence in the 24h runtime.}
  sample_interval_seconds: {value: 60, description: Minimum spacing between durable ES path samples.}
  short_horizon_minutes: {value: 15, description: Short impulse horizon.}
  medium_horizon_minutes: {value: 60, description: Primary trend horizon.}
  long_horizon_minutes: {value: 180, description: Persistent session trend horizon.}
  short_move_points: {value: 3.5, description: Minimum short-horizon ES impulse used for reversal confirmation.}
  medium_move_points: {value: 8.0, description: Minimum 60-minute ES move used to establish direction.}
  long_move_points: {value: 15.0, description: Minimum 180-minute ES move used to establish persistent direction.}
  reversal_points: {value: 10.0, description: Minimum recovery from the active bearish-leg low or drawdown from the active bullish-leg high required for reversal.}
  confirmation_observations: {value: 2, description: Consecutive observations required before changing the formal trend regime.}
  max_quote_age_seconds: {value: 90.0, description: Maximum ES transport age accepted by the trend machine.}
  retention_hours: {value: 18, description: Rolling ES path retained for indicators and audit.}
  pending_event_ttl_seconds: {value: 300, description: Retry lifetime for an unacknowledged confirmed transition notification.}

market_features:
  enabled: {value: true, description: Builds unified feature frames.}
  interval_seconds: {value: 5, description: Fast decision-gate cadence.}
  sample_interval_seconds: {value: 60, description: Durable sample cadence.}
  max_quote_age_seconds: {value: 90.0, description: Maximum source age.}
  retention_hours: {value: 18, description: Market sample retention.}
  option_history_minutes: {value: 180, description: Option aggregate history.}
  volume_baseline_sessions: {value: 20, description: Same-clock volume baseline sessions.}
  hot_option_limit: {value: 64, description: Hot option contract limit.}
  provider_sync_tolerance_seconds: {value: 5.0, description: Cross-provider synchronization tolerance.}
  asia_end_et: {value: "03:00", description: Asia segment end.}
  europe_end_et: {value: "08:00", description: Europe segment end.}
  premarket_end_et: {value: "09:30", description: US premarket end.}
  rth_end_et: {value: "16:00", description: Cash RTH end.}
  curb_end_et: {value: "17:00", description: Curb segment end.}
  min_l1_liquidity_score: {value: 40.0, description: Minimum L1 liquidity score.}
  l1_spread_p50_limit_bps: {value: 500.0, description: Median L1 spread score ceiling.}
  l1_spread_p90_limit_bps: {value: 1500.0, description: Tail L1 spread score ceiling.}
  trade_follow_through_seconds: {value: 30.0, description: Follow-through hold.}
  trade_follow_through_min_points: {value: 2.0, description: Fixed follow-through distance.}
  trade_follow_through_em_fraction: {value: 0.05, description: EM follow-through fraction.}
  trade_repricing_max_age_seconds: {value: 90.0, description: Repricing freshness.}
  trade_quote_max_age_seconds: {value: 5.0, description: Trade quote freshness.}
  trade_market_anchor_max_age_seconds: {value: 20.0, description: Trade market-anchor freshness.}
  trade_structure_drift_points: {value: 2.5, description: Maximum live-frame decision drift.}
  trade_entry_spread_fraction: {value: 0.35, description: Initial entry spread fraction.}
  trade_intent_ttl_seconds: {value: 90.0, description: Trade intent TTL.}
  trade_entry_window_seconds: {value: 20.0, description: Alert candidate entry observation window.}
  trade_invalidation_buffer_points: {value: 3.0, description: SPX invalidation buffer.}
  trade_target_em_fraction: {value: 0.15, description: Fallback target EM fraction.}
  trade_min_target_room_points: {value: 3.0, description: Minimum remaining SPX target room.}
  trade_min_reward_risk: {value: 0.25, description: Minimum target-room to invalidation-distance ratio.}
  trade_time_stop_minutes: {value: 15, description: Default time stop.}
  session_episode_enabled: {value: true, description: Enables the session structural episode.}
  session_break_buffer_points: {value: 2.0, description: Structural break and reclaim buffer.}
  session_extreme_extension_points: {value: 5.0, description: Extreme extension distance.}
  session_reclaim_hold_seconds: {value: 60.0, description: Reclaim confirmation hold.}
  session_recovery_ratio: {value: 0.50, description: Recovery completion fraction.}
  greek_decision_min_coverage: {value: 0.60, description: Greek decision coverage gate.}
  greek_target_delta_min: {value: 0.35, description: Preferred minimum absolute Delta.}
  greek_target_delta_max: {value: 0.70, description: Preferred maximum absolute Delta.}
  greek_max_theta_15m_loss_fraction: {value: 0.35, description: Maximum modeled fifteen-minute Theta loss.}
  greek_max_iv_crush_loss_fraction: {value: 0.45, description: Maximum modeled three-vol IV crush loss.}
  greek_delta_saturation: {value: 0.85, description: Delta saturation exit threshold.}
  virtual_strategy_enabled: {value: true, description: Enables broker-independent virtual strategy tracking.}
  virtual_profit_take_fraction: {value: 0.30, description: Virtual take-profit premium fraction.}
  virtual_gamma_retention_fraction: {value: 0.60, description: Virtual Gamma retention exit fraction.}
  virtual_iv_drop_vol_points: {value: 1.0, description: Post-event IV decline threshold.}
  virtual_wall_touch_points: {value: 5.0, description: Call Wall take-profit distance.}
  virtual_gth_time_stop_minutes: {value: 360, description: GTH virtual strategy time stop.}

provider_failover:
  enabled:
    value: true
    description: Enables automatic Schwab-primary health evaluation and IBKR market-data fallback control.
  control_ibkr_stream_enabled:
    value: false
    description: Lets automatic failover start and stop IBKR market-data subscriptions; kept false until IBKR subscription-control acceptance is complete.
  state_path:
    value: ""
    description: Optional failover control-state path; empty stores provider_failover_state.json under the configured data latest directory.
  required_instruments:
    value: [index:SPX, future:ES]
    description: Direct live anchors that must both be usable before a provider is considered healthy for 0DTE alerts.
  provider_state_max_age_seconds:
    value: 45.0
    description: Maximum recent provider-state age used to honor an explicit unavailable or disconnected status.
  quote_max_age_seconds:
    value: 30.0
    description: Maximum direct-anchor source age used for provider health; this exceeds the Schwab REST collection cadence to avoid scheduler-order false failovers.
  monitor_rth_only:
    value: false
    description: Monitors RTH plus regular ES Globex sessions.
  globex_required_instruments: {value: [future:ES], description: Required Globex anchors.}
  gth_min_live_option_contracts: {value: 20, description: Minimum fresh SPXW contracts required during GTH.}
  gth_option_quote_max_age_seconds: {value: 90.0, description: Maximum GTH option source age.}
  schwab_unhealthy_observations:
    value: 2
    description: Consecutive unhealthy Schwab observations required before requesting IBKR fallback.
  schwab_recovery_observations:
    value: 3
    description: Consecutive healthy Schwab observations required before returning from IBKR fallback.
  ibkr_unhealthy_observations:
    value: 4
    description: Consecutive unhealthy IBKR observations required before declaring both direct providers unavailable.
  ibkr_recovery_observations:
    value: 3
    description: Consecutive healthy IBKR observations required before entering IBKR fallback, to avoid farm half-recovery false switches.
  control_state_max_age_seconds:
    value: 60.0
    description: Maximum failover control-state age accepted by the IBKR stream before it fails closed to standby.
  transition_alert_max_age_seconds:
    value: 300.0
    description: Maximum age of a provider transition that may create a human notification after a process restart.
  interval_seconds:
    value: 15
    description: Cadence for provider-health observations and failover state persistence.

schwab:
  api_base_url:
    value: https://api.schwabapi.com
    description: Official Schwab Trader API base URL.
  token_file:
    value: runtime/schwab-token.json
    description: Owner-readable OAuth token file managed by the Oracle gateway.
  callback_url:
    value: https://127.0.0.1:8182
    description: Safe local development callback; production overrides this with the approved Cloudflare URL.
  oauth_bind_host:
    value: 127.0.0.1
    description: Loopback interface for the callback listener behind Cloudflare Tunnel.
  oauth_bind_port:
    value: 8183
    description: Local callback listener port routed by Cloudflare Tunnel.
  oauth_state_file:
    value: runtime/schwab-oauth-state.json
    description: Single-use OAuth authorization state file.
  oauth_state_ttl_seconds:
    value: 900
    description: Lifetime of one generated OAuth authorization request.
  gateway_bind_host:
    value: 127.0.0.1
    description: Loopback-only bind address for the internal market-data gateway.
  gateway_bind_port:
    value: 8184
    description: Internal localhost market-data gateway port.
  request_timeout_seconds:
    value: 12
    description: Network timeout for a Schwab market-data request.
  quote_fields:
    value: quote,reference,extended,regular
    description: Quote payload sections requested from Schwab.
  option_chain_strike_count:
    value: 10
    description: Default strikeCount around ATM per chain expiration; per-instrument option_chain_strike_count overrides this ($SPX uses 40 for wider GEX/DEX walls).
  quote_symbol_capacity:
    value: 500
    description: Total Schwab quote-lane symbol capacity used to plan context and dynamic SPXW coverage.
  quote_batch_size:
    value: 80
    description: Operational quote-batch ceiling; context anchors are isolated first and option hot-lane symbols are split into bounded requests below Schwab's documented 500-symbol limit.
  allowed_market_data_paths:
    value: [/marketdata/v1/quotes, /marketdata/v1/chains]
    description: Read-only API paths exposed by the localhost gateway; account and trading paths are intentionally excluded.
  quote_path:
    value: /marketdata/v1/quotes
    description: Schwab endpoint used for batched underlying and context quotes.
  option_chain_path:
    value: /marketdata/v1/chains
    description: Schwab endpoint used for option-chain snapshots.
  diagnostics:
    max_error_body_characters:
      value: 500
      description: Maximum provider error-body characters retained in verifier output.
  request_policy:
    requests_per_minute:
      value: 120
      description: Global outbound Schwab request budget enforced by the single gateway owner.
    max_retries:
      value: 3
      description: Maximum retries for retryable transport or provider failures.
    retry_base_seconds:
      value: 0.5
      description: Initial exponential-backoff delay for a retryable request.
    retry_max_seconds:
      value: 8
      description: Maximum exponential-backoff delay between retries.
    retry_after_max_seconds:
      value: 30
      description: Longest provider Retry-After delay the gateway will wait inline.
  collection:
    enabled:
      value: true
      description: Enables the dedicated long-running Schwab market-data collector.
    service_loop_enabled:
      value: false
      description: Legacy embedded collector gate.
    interval_seconds:
      value: 1
      description: One-second planner tick needed to realize 1.5-3 second lane cadences; each lane independently decides whether it is due.
    request_budget_warning_per_minute:
      value: 84
      description: Planned request ceiling using 70 percent of nominal capacity.
    planned_requests_per_minute:
      value: 84
      description: Hard scheduler plan ceiling.
    cadence:
      off_hours_quote_seconds: {value: 15.0, description: Off-hours quote cadence.}
      off_hours_front_chain_seconds: {value: 60.0, description: Off-hours front-chain cadence.}
      off_hours_next_chain_seconds: {value: 300.0, description: Off-hours next-expiry cadence.}
      off_hours_confirmation_chain_seconds: {value: 300.0, description: Off-hours confirmation cadence.}
      gth_quote_seconds: {value: 15.0, description: GTH REST backup quote cadence.}
      gth_front_chain_seconds: {value: 15.0, description: GTH SPX front-chain cadence.}
      gth_next_chain_seconds: {value: 60.0, description: GTH next-expiry cadence.}
      gth_confirmation_chain_seconds: {value: 300.0, description: GTH confirmation-chain cadence.}
      normal_quote_seconds: {value: 2.0, description: Normal RTH quote cadence.}
      normal_front_chain_seconds: {value: 3.0, description: Normal RTH front-chain cadence.}
      active_quote_seconds: {value: 1.5, description: Active-window quote cadence.}
      active_front_chain_seconds: {value: 2.5, description: Active-window chain cadence.}
      burst_quote_seconds: {value: 1.5, description: Burst quote cadence.}
      burst_front_chain_seconds: {value: 2.0, description: Burst chain cadence.}
      next_chain_seconds: {value: 30.0, description: Next-expiry chain cadence.}
      spy_xsp_chain_seconds: {value: 15.0, description: SPY and XSP chain cadence.}
      qqq_iwm_chain_seconds: {value: 30.0, description: QQQ and IWM chain cadence.}
    wide_chain:
      strike_count_candidates: {value: [80, 100, 120], description: Adaptive SPX strike counts.}
      next_expiry_strike_count: {value: 40, description: Fixed half-width next-expiry SPX chain.}
      min_usable_strikes: {value: 40, description: Minimum usable strikes.}
      min_two_sided_ratio: {value: 0.80, description: Minimum two-sided ratio.}
      expected_move_multiple: {value: 2.5, description: Acquisition expected-move multiple.}
      min_width_points: {value: 150.0, description: Minimum SPX width per side.}
      max_gap_multiple: {value: 2.0, description: Maximum strike gap multiple.}
    hot_lane:
      dynamic_symbol_reserve: {value: 10, description: Reserved quote batch slots.}
      max_plan_age_seconds: {value: 30.0, description: Maximum hot-plan age.}
      recenter_drift_points: {value: 10.0, description: Hot-plan recenter threshold.}
  streaming:
    mode:
      value: live
      description: Schwab WebSocket activation mode; the approved Trader API app now runs live for ES/MES anchors and bounded SPXW subscription verification.
    canonical_symbols:
      value: [SPX, SPY, RSP, ES, MES]
      description: Small direct-anchor and breadth universe subscribed through Schwab Level-One streaming; futures roots resolve to concrete active contracts.
    flush_interval_seconds:
      value: 1.0
      description: Cadence for flushing changed Schwab streaming symbols to durable storage.
    symbol_refresh_interval_seconds:
      value: 300.0
      description: Cadence for re-resolving logical ES and MES roots; a changed active contract closes the current WebSocket so the supervisor reconnects and subscribes to the new contract.
    reconnect_min_seconds:
      value: 2.0
      description: Initial reconnect delay after a Schwab WebSocket failure.
    reconnect_max_seconds:
      value: 60.0
      description: Maximum exponential reconnect delay for Schwab WebSocket failures.
    websocket_open_timeout_seconds:
      value: 10.0
      description: Timeout passed to the WebSocket connection handshake.
    shadow_latest_path:
      value: ""
      description: Optional shadow latest-state path; empty uses schwab_stream_shadow.json under the configured data latest directory.
    option_hot_symbol_limit:
      value: 160
      description: Maximum current-expiry SPXW hot-lane contracts subscribed through Level-One option streaming; covers the full 80-strike 0DTE call/put window.
    option_symbol_refresh_seconds:
      value: 5.0
      description: Cadence for applying changed hot-lane option subscriptions without reconnecting the WebSocket.
    option_plan_max_age_seconds:
      value: 120.0
      description: Maximum age of the collector hot-option plan accepted by the streaming runtime.
    validation_future_symbols:
      value: [NQ, RTY, YM]
      description: Futures subscribed on the token-owner connection for bounded source-time acceptance only; they are persisted but excluded from production decision inputs until promoted.
    futures_option_probe_symbol:
      value: ""
      description: Exact thinkorswim provider symbol for one ES futures option; empty disables the single-contract probe and comma-separated or multi-contract values are rejected.
  future_contract_resolution:
    calendar_timezone:
      value: America/New_York
      description: Exchange-local timezone used to choose the active quarterly equity-index futures contract.
    quarterly_month_codes:
      value: {3: H, 6: M, 9: U, 12: Z}
      description: CME quarterly expiration month to provider symbol code mapping for ES and MES.
    roll_calendar_days_before_expiry:
      value: 4
      description: Switches to the next quarterly contract on the Monday four calendar days before the standard third-Friday expiration.
    roll_session_start_time:
      value: "18:00"
      description: New York time when the Monday roll trading session begins on the preceding Sunday evening.
  instruments:
    - canonical_symbol: SPX
      instrument_type: index
      quote_symbol: $SPX
      option_chain_symbol: $SPX
      option_trading_classes: [SPX, SPXW]
      collect_quote: true
      collect_option_chain: true
      chain_interval_seconds: 5
      option_chain_strike_count: 80
      description: S&P 500 index adaptive wide-chain baseline.
    - canonical_symbol: XSP
      instrument_type: index
      quote_symbol: $XSP
      option_chain_symbol: $XSP
      option_trading_classes: [XSP]
      collect_quote: true
      collect_option_chain: true
      chain_interval_seconds: 15
      description: Mini-SPX index and its option chain. B-tier chain at 15s (default strikeCount=10).
    - canonical_symbol: VIX
      instrument_type: index
      quote_symbol: $VIX
      collect_quote: true
      collect_option_chain: false
      description: Cboe Volatility Index used as an intraday volatility anchor.
    - canonical_symbol: VIX1D
      instrument_type: index
      quote_symbol: $VIX1D
      collect_quote: true
      collect_option_chain: false
      description: Cboe one-day volatility index for 0DTE conditions.
    - canonical_symbol: VIX9D
      instrument_type: index
      quote_symbol: $VIX9D
      collect_quote: true
      collect_option_chain: false
      description: Cboe nine-day volatility index for near-term term structure.
    - canonical_symbol: VIX3M
      instrument_type: index
      quote_symbol: $VIX3M
      collect_quote: true
      collect_option_chain: false
      description: Three-month volatility index for term-structure context.
    - canonical_symbol: VVIX
      instrument_type: index
      quote_symbol: $VVIX
      collect_quote: true
      collect_option_chain: false
      description: Volatility-of-volatility reference index.
    - canonical_symbol: SKEW
      instrument_type: index
      quote_symbol: $SKEW
      collect_quote: true
      collect_option_chain: false
      description: Cboe tail-risk skew reference index.
    - canonical_symbol: NDX
      instrument_type: index
      quote_symbol: $NDX
      collect_quote: true
      collect_option_chain: false
      description: Nasdaq-100 cash index used for cross-index confirmation.
    - canonical_symbol: RUT
      instrument_type: index
      quote_symbol: $RUT
      collect_quote: true
