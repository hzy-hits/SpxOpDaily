services:
  strategy-review:
    image: nginx:alpine
    container_name: spx-strategy-review
    restart: unless-stopped
    network_mode: container:code-server
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18081/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
