map $uri $spxw_surface_cache_control {
    default "no-store, max-age=0";
    ~^/api/v1/replay/sessions$ "private, max-age=30";
    ~^/api/v1/replay/sessions/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/timeline$ "private, max-age=30";
    ~^/api/v1/replay/sessions/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/session-surface$ "private, no-cache";
    ~^/api/v1/replay/sessions/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/trend$ "private, no-cache";
    ~^/api/v1/replay/sessions/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]/frame$ "private, no-cache";
    ~^/api/v1/replay/frames/ "private, no-cache";
}

server {
    listen 18082 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types application/json application/javascript text/css;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header Cache-Control $spxw_surface_cache_control always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'self'; form-action 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location = /healthz {
        access_log off;
        limit_except GET {
            deny all;
        }
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host replay-api;
        proxy_connect_timeout 1s;
        proxy_read_timeout 2s;
        proxy_hide_header Cache-Control;
        proxy_pass http://unix:/usr/share/nginx/replay-runtime/replay-api.sock:/healthz;
    }

    location = /api/v1/snapshot {
        limit_except GET {
            deny all;
        }
        alias /usr/share/nginx/data/snapshot.json;
        default_type application/json;
    }

    location = /api/v1/replays/2026-07-17T183500Z {
        limit_except GET {
            deny all;
        }
        alias /usr/share/nginx/data/replays/2026-07-17T183500Z.json;
        default_type application/json;
    }

    location ^~ /api/v1/replay/ {
        limit_except GET {
            deny all;
        }
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host replay-api;
        proxy_connect_timeout 1s;
        proxy_read_timeout 180s;
        proxy_send_timeout 2s;
        proxy_hide_header Cache-Control;
        proxy_pass http://unix:/usr/share/nginx/replay-runtime/replay-api.sock:;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /data/ {
        return 404;
    }

    location = / {
        limit_except GET {
            deny all;
        }
        try_files /index.html =404;
    }

    location = /index.html {
        limit_except GET {
            deny all;
        }
        try_files /index.html =404;
    }

    location = /live {
        limit_except GET {
            deny all;
        }
        try_files /index.html =404;
    }

    location = /live/ {
        return 308 ../live$is_args$args;
    }

    location = /replay {
        limit_except GET {
            deny all;
        }
        try_files /index.html =404;
    }

    location = /replay/ {
        return 308 ../replay$is_args$args;
    }

    location = /styles.css {
        limit_except GET {
            deny all;
        }
        try_files /styles.css =404;
    }

    location = /app.js {
        limit_except GET {
            deny all;
        }
        try_files /app.js =404;
    }

    location = /robots.txt {
        limit_except GET {
            deny all;
        }
        try_files /robots.txt =404;
    }

    location / {
        return 404;
    }
}
