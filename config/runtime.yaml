# SPX Spark runtime configuration.
#
# Every mutable value lives beside a human-readable description. Environment
# variables may override these defaults; secrets remain in .env and never live
# in this file.

schema_version:
  value: 1
  description: Version of this runtime configuration schema.

market_data:
  known_providers:
    value: [schwab, ibkr, hyperliquid, polymarket, internal, mock, unknown]
    description: Provider names accepted by storage and quote selection.
  provider_priority:
    value: [schwab, ibkr, hyperliquid, polymarket, internal, mock, unknown]
    description: Preferred provider order after freshness and quality checks; Schwab is primary and IBKR is fallback.
  latest_stale_after_seconds:
    value: 15
    description: Maximum age of a normal live quote before storage marks it stale.
  delayed_stale_after_seconds:
    value: 60
    description: Maximum age allowed for a quote explicitly labelled delayed.
  slow_index_stale_after_seconds:
    value: 900
    description: Longer freshness window for slow-moving index and macro reference quotes.
  slow_index_labels:
    value: [index:VIX, index:VIX1D, index:VIX9D, index:VIX3M, index:VVIX, index:SKEW, equity:QQQ, equity:IWM, equity:DIA, equity:HYG, equity:LQD, equity:TLT, equity:IEF, equity:SHY, equity:UUP, equity:GLD, equity:USO, equity:RSP, equity:XLU]
    description: Canonical instruments that use the longer slow-index freshness window.

schwab:
  api_base_url:
    value: https://api.schwabapi.com
    description: Official Schwab Trader API base URL.
  token_file:
    value: runtime/schwab-token.json
    description: Owner-readable OAuth token file managed by the Oracle gateway.
  callback_url:
    value: https://127.0.0.1:8182
    description: Safe local development callback; production overrides this with the approved Cloudflare URL.
  oauth_bind_host:
    value: 127.0.0.1
    description: Loopback interface for the callback listener behind Cloudflare Tunnel.
  oauth_bind_port:
    value: 8183
    description: Local callback listener port routed by Cloudflare Tunnel.
  oauth_state_file:
    value: runtime/schwab-oauth-state.json
    description: Single-use OAuth authorization state file.
  oauth_state_ttl_seconds:
    value: 900
    description: Lifetime of one generated OAuth authorization request.
  gateway_bind_host:
    value: 127.0.0.1
    description: Loopback-only bind address for the internal market-data gateway.
  gateway_bind_port:
    value: 8184
    description: Internal localhost market-data gateway port.
  request_timeout_seconds:
    value: 12
    description: Network timeout for a Schwab market-data request.
  quote_fields:
    value: quote,reference,extended,regular
    description: Quote payload sections requested from Schwab.
  option_chain_strike_count:
    value: 10
    description: Number of strikes around the underlying requested per chain expiration.
  quote_batch_size:
    value: 500
    description: Maximum symbols placed in one Schwab quote request.
  allowed_market_data_paths:
    value: [/marketdata/v1/quotes, /marketdata/v1/chains]
    description: Read-only API paths exposed by the localhost gateway; account and trading paths are intentionally excluded.
  quote_path:
    value: /marketdata/v1/quotes
    description: Schwab endpoint used for batched underlying and context quotes.
  option_chain_path:
    value: /marketdata/v1/chains
    description: Schwab endpoint used for option-chain snapshots.
  diagnostics:
    max_error_body_characters:
      value: 500
      description: Maximum provider error-body characters retained in verifier output.
  request_policy:
    requests_per_minute:
      value: 120
      description: Global outbound Schwab request budget enforced by the single gateway owner.
    max_retries:
      value: 3
      description: Maximum retries for retryable transport or provider failures.
    retry_base_seconds:
      value: 0.5
      description: Initial exponential-backoff delay for a retryable request.
    retry_max_seconds:
      value: 8
      description: Maximum exponential-backoff delay between retries.
    retry_after_max_seconds:
      value: 30
      description: Longest provider Retry-After delay the gateway will wait inline.
  collection:
    enabled:
      value: true
      description: Enables periodic Schwab quote and option-chain collection in the 24-hour service.
    interval_seconds:
      value: 15
      description: Collection cadence balancing 0DTE responsiveness against the 120-request-per-minute budget.
  instruments:
    - canonical_symbol: SPX
      instrument_type: index
      quote_symbol: $SPX
      option_chain_symbol: $SPX
      option_trading_classes: [SPX, SPXW]
      collect_quote: true
      collect_option_chain: true
      description: S&P 500 index; Schwab returns both monthly SPX and daily SPXW contracts from the $SPX chain.
    - canonical_symbol: XSP
      instrument_type: index
      quote_symbol: $XSP
      option_chain_symbol: $XSP
      option_trading_classes: [XSP]
      collect_quote: true
      collect_option_chain: true
      description: Mini-SPX index and its option chain.
    - canonical_symbol: VIX
      instrument_type: index
      quote_symbol: $VIX
      collect_quote: true
      collect_option_chain: false
      description: Cboe Volatility Index used as an intraday volatility anchor.
    - canonical_symbol: VIX1D
      instrument_type: index
      quote_symbol: $VIX1D
      collect_quote: true
      collect_option_chain: false
      description: Cboe one-day volatility index for 0DTE conditions.
    - canonical_symbol: VIX9D
      instrument_type: index
      quote_symbol: $VIX9D
      collect_quote: true
      collect_option_chain: false
      description: Cboe nine-day volatility index for near-term term structure.
    - canonical_symbol: VIX3M
      instrument_type: index
      quote_symbol: $VIX3M
      collect_quote: true
      collect_option_chain: false
      description: Three-month volatility index for term-structure context.
    - canonical_symbol: VVIX
      instrument_type: index
      quote_symbol: $VVIX
      collect_quote: true
      collect_option_chain: false
      description: Volatility-of-volatility reference index.
    - canonical_symbol: SKEW
      instrument_type: index
      quote_symbol: $SKEW
      collect_quote: true
      collect_option_chain: false
      description: Cboe tail-risk skew reference index.
    - canonical_symbol: NDX
      instrument_type: index
      quote_symbol: $NDX
      collect_quote: true
      collect_option_chain: false
      description: Nasdaq-100 cash index used for cross-index confirmation.
    - canonical_symbol: RUT
      instrument_type: index
      quote_symbol: $RUT
      collect_quote: true
      collect_option_chain: false
      description: Russell 2000 cash index used for breadth context.
    - canonical_symbol: DJI
      instrument_type: index
      quote_symbol: $DJI
