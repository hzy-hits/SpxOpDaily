server {
    listen 18082 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;
    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr warn;

    add_header Cache-Control "no-store, max-age=0" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src 'self'; img-src 'self'; font-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'self'; form-action 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /api/v1/snapshot {
        limit_except GET {
            deny all;
        }
        alias /usr/share/nginx/data/snapshot.json;
        default_type application/json;
    }

    location = /api/v1/replays/2026-07-17T183500Z {
        limit_except GET {
            deny all;
        }
        alias /usr/share/nginx/data/replays/2026-07-17T183500Z.json;
        default_type application/json;
    }

    location ^~ /api/ {
        return 404;
    }

    location ^~ /data/ {
        return 404;
    }

    location = / {
        limit_except GET {
            deny all;
        }
        try_files /index.html =404;
    }

    location = /index.html {
        limit_except GET {
            deny all;
        }
        try_files /index.html =404;
    }

    location = /styles.css {
        limit_except GET {
            deny all;
        }
        try_files /styles.css =404;
    }

    location = /app.js {
        limit_except GET {
            deny all;
        }
        try_files /app.js =404;
    }

    location = /robots.txt {
        limit_except GET {
            deny all;
        }
        try_files /robots.txt =404;
    }

    location / {
        return 404;
    }
}
